name: Test calculator

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'package.json'
      - 'Makefile'
      - '.github/workflows/test-calculator.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'package.json'
      - 'Makefile'
      - '.github/workflows/test-calculator.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: make test
