name: Build STL models

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/build-stl.yml'
  pull_request:
    paths:
      - 'src/**'
      - '.github/workflows/build-stl.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OPENSCAD_APPIMAGE_URL: https://files.openscad.org/snapshots/OpenSCAD-2026.04.14-x86_64.AppImage
    steps:
      - uses: actions/checkout@v4

      - name: Install apt dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libfuse2 xvfb libegl1 libgl1 libglu1-mesa libglib2.0-0
          version: 1.0

      - name: Cache OpenSCAD AppImage
        id: cache-openscad
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/openscad
          key: openscad-${{ env.OPENSCAD_APPIMAGE_URL }}

      - name: Download OpenSCAD nightly
        if: steps.cache-openscad.outputs.cache-hit != 'true'
        run: |
          curl --fail -L -o /tmp/openscad.AppImage "$OPENSCAD_APPIMAGE_URL"
          chmod +x /tmp/openscad.AppImage
          sudo mv /tmp/openscad.AppImage /usr/local/bin/openscad

      - name: Ensure executable
        run: sudo chmod +x /usr/local/bin/openscad

      - name: Build STLs
        run: make OPENSCAD="xvfb-run -a openscad"

      - uses: actions/upload-artifact@v4
        with:
          name: stls
          path: build/*.stl

      - name: Upload STLs to release
        if: github.event_name == 'release'
        run: |
          for stl in build/*.stl; do
            gh release upload "${{ github.event.release.tag_name }}" "$stl" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
